name: Metrics

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Bujapetas
          template: classic
          filename: github-metrics.svg
          base: header, activity, community, repositories
          config_timezone: Europe/Madrid
